name: Publish Validation Sources

# Fetches validation sources from the Sourceror API and publishes them as CSV

on:
  # schedule:
  #   # Run every 5 minutes during EST business hours (7am-10pm EST = 12:00-02:59 UTC)
  #   - cron: '*/5 0-2,12-23 * * *'
  #   # Run every 30 minutes outside EST business hours (10pm-7am EST = 03:00-11:59 UTC)
  #   - cron: '*/30 3-11 * * *'
  push:
    branches:
      - VWB-8795-create-gh-actions-public-sources-flow
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - create PR but do not auto-merge'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  SOURCES_PATH: validation-sources
  CSV_FILE: validation-sources.csv
  README_FILE: README.md

jobs:
  publish:
    name: Publish Validation Sources
    # Use digicert runner with access to internal Sourceror API
    runs-on: digicert-medium
    
    steps:
      - name: Checkout reports repo
        uses: actions/checkout@v4
        with:
          ref: master
      
      - name: Fetch validation sources from Sourceror API - US
        id: fetch
        run: |
          echo "Fetching validation sources from Sourceror API..."
          
          curl -sf \
            -H "Accept: application/json" \
            -o sources.json \
            "${{ secrets.SOURCEROR_API_URL }}/sources/public??filter_level=ev&is_disclosed=false"
          
          if [ ! -s sources.json ]; then
            echo "::error::Failed to fetch validation sources from Sourceror API"
            exit 1
          fi
          
          SOURCES_COUNT=$(jq length sources.json)
          echo "sources_count=$SOURCES_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$SOURCES_COUNT" -eq 0 ]; then
            echo "::notice::No validation sources to disclose"
            echo "nothing_to_disclose=true" >> $GITHUB_OUTPUT
          else
            echo "nothing_to_disclose=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Convert JSON to CSV
        if: steps.fetch.outputs.nothing_to_disclose != 'true'
        run: |
          # CSV header matching the PHP VALIDATION_ITEM_FIELDS
          echo 'Name,URL,Category,Country,State/Province,Locality,Registration Scheme,Last Updated' > "${{ env.SOURCES_PATH }}/${{ env.CSV_FILE }}"
          
          # Process each source, filtering out whois/blacklist/blocklist/qiis categories
          jq -r '
            .[] | 
            select(
              (.category | ascii_downcase) != "whois" and 
              (.category | ascii_downcase) != "blacklist" and 
              (.category | ascii_downcase) != "blocklist" and 
              (.category | ascii_downcase) != "qiis"
            ) |
            [
              .title,
              .url,
              .category,
              .country,
              .state,
              .city,
              (.joi_registration_number_patterns | join(", ")),
              .last_updated
            ] | @csv
          ' sources.json >> "${{ env.SOURCES_PATH }}/${{ env.CSV_FILE }}"
          
          echo "Generated CSV with $(wc -l < "${{ env.SOURCES_PATH }}/${{ env.CSV_FILE }}") lines"
      
      - name: Update README with timestamp
        if: steps.fetch.outputs.nothing_to_disclose != 'true' && github.event_name != 'push'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d-%H:%M:%S')
          cat > "${{ env.SOURCES_PATH }}/${{ env.README_FILE }}" << EOF
          <h1>Validation Sources</h1>
          <p><b>Last Updated</b>: ${TIMESTAMP}</p>
          EOF
      
      - name: Check for changes
        if: steps.fetch.outputs.nothing_to_disclose != 'true' && github.event_name != 'push'
        id: changes
        run: |
          git diff --quiet "${{ env.SOURCES_PATH }}/" && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.fetch.outputs.nothing_to_disclose != 'true' && steps.changes.outputs.changed == 'true' && github.event_name != 'push'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update validation sources"
          title: "Update Validation Sources ${{ github.run_id }}"
          body: |
            ## Automated PR to update validation sources
            
            **Triggered by:** ${{ github.event_name == 'schedule' && 'Scheduled run' || 'Manual trigger' }}
            **Sources count:** ${{ steps.fetch.outputs.sources_count }}
            **Timestamp:** ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            
            ---
            _This PR was automatically generated by the [Publish Validation Sources](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow._
          branch: update-sources-${{ github.run_id }}
          base: master
          delete-branch: true
          labels: automated,validation-sources
      
      - name: Enable auto-merge
        if: steps.fetch.outputs.nothing_to_disclose != 'true' && steps.create-pr.outputs.pull-request-number && inputs.dry_run != true && github.event_name != 'push'
        run: |
          gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          if [ "${{ steps.fetch.outputs.nothing_to_disclose }}" == "true" ]; then
            echo "### ℹ️ Nothing to Disclose" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No validation sources available for disclosure." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "### ✅ Validation Sources Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Sources fetched:** ${{ steps.fetch.outputs.sources_count }}" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
              echo "- **Pull Request:** ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ℹ️ No Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Validation sources are already up to date." >> $GITHUB_STEP_SUMMARY
          fi
